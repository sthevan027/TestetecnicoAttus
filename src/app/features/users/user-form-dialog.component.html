<h2 mat-dialog-title>{{ data.user ? 'Editar usuário' : 'Novo usuário' }}</h2>

<div mat-dialog-content class="dialog-body">
  <form [formGroup]="form" class="form-grid">
    <mat-form-field appearance="outline">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="name" autocomplete="name" />
      <mat-error>{{ fieldError('name') }}</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>E-mail</mat-label>
      <input matInput type="email" formControlName="email" autocomplete="email" />
      <mat-error>{{ fieldError('email') }}</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>CPF</mat-label>
      <input matInput formControlName="cpf" inputmode="numeric" />
      <mat-error>{{ fieldError('cpf') }}</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Telefone</mat-label>
      <input matInput formControlName="phone" inputmode="tel" />
      <mat-error>{{ fieldError('phone') }}</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Tipo de telefone</mat-label>
      <mat-select formControlName="phoneType">
        <mat-option value="mobile">Celular</mat-option>
        <mat-option value="landline">Fixo</mat-option>
        <mat-option value="other">Outro</mat-option>
      </mat-select>
      <mat-error>{{ fieldError('phoneType') }}</mat-error>
    </mat-form-field>
  </form>
</div>

<div mat-dialog-actions align="end">
  <button mat-button type="button" (click)="dialogRef.close(false)">Cancelar</button>
  <button mat-flat-button color="primary" type="button" [disabled]="form.invalid" (click)="submit()">
    Salvar
  </button>
</div>
